<div id="app"></div>
<script>
const SHOT_CONFIG={layup:{id:'layup',label:'Layup',points:1,baseOdds:60,maxOdds:95,upgradeStep:5,costs:[3,5,8,12,18,27,40,60,90],x:70,y:18},freeThrow:{id:'freeThrow',label:'Free Throw',points:2,baseOdds:30,maxOdds:85,upgradeStep:5,costs:[4,7,11,17,26,39,58,87,130,195,290,430],x:50,y:39},three:{id:'three',label:'Three Pointer',points:3,baseOdds:10,maxOdds:75,upgradeStep:5,costs:[5,9,16,29,52,94,170,305,550,990,1780,3200,5750,10000],x:34,y:58},halfCourt:{id:'halfCourt',label:'Half Court',points:5,baseOdds:5,maxOdds:50,upgradeStep:5,unlockCost:25,costs:[40,80,160,320,650,1300,2700,5500,11000],x:58,y:90}};
const EXTRA_SHOT_COSTS=[3,6,12,25,50,100,175,275,425],GOLDEN_BALL_COSTS=[50,175,500,1500,4500],HOT_HAND_COSTS=[35,125,500,2500],DOUBLE_RIM_COSTS=[60,180,500,1400,4000],SPECIALIST_COSTS=[10,25,75,250,900],PLAYOFF_TICKET_COST=10000,TROPHY_COST=100000,RIM={x:50,y:15},RIM_DROP_Y=25;
let screen='title',currentPoints=0,lastResult=null,isShooting=false,activeShot=null,shotCount=0,pointsPop=null,attemptsUsed=0,streak=0,bestStreak=0,hasWon=false,bigShotMessage=null,shotHistory=[];

const $=s=>document.querySelector(s),fmt=v=>Math.floor(Number(v)||0).toLocaleString();
function shotsPerTrip(){return 1+upgrades.extraShots}function goldenChance(){return upgrades.goldenBall*3}function doubleRimChance(){return upgrades.doubleRim*10}function hotHandMultFor(n){if(upgrades.hotHand>=4&&n>=5)return 6;if(upgrades.hotHand>=3&&n>=4)return 4;if(upgrades.hotHand>=2&&n>=3)return 3;if(upgrades.hotHand>=1&&n>=2)return 2;return 1}function hotHandMult(){return hotHandMultFor(streak)}function specMult(id){return id==='layup'?1+upgrades.layupSpecialist:id==='freeThrow'?1+upgrades.freeThrowSpecialist:id==='three'?1+upgrades.threeSpecialist:id==='halfCourt'?1+upgrades.halfCourtSpecialist:1}function shotValue(s){return s.points*specMult(s.id)}function availableShots(){return Object.values(SHOT_CONFIG).filter(s=>s.id!=='halfCourt'||upgrades.halfCourtUnlocked).map(s=>({...s,odds:Math.min(s.maxOdds,s.baseOdds+upgrades[s.id]*s.upgradeStep)}))}
function setScreen(s){screen=s;render()}function render(){const app=$('#app'); if(screen==='title')return renderTitle(app); if(screen==='lockerRoom')return renderLocker(app); if(screen==='court')return renderCourt(app); if(screen==='playoff')return renderPlayoff(app); if(screen==='win')return renderWin(app)}
function renderTitle(app){app.innerHTML=`<main class="app"><div class="card"><div class="title-screen"><div class="orb1"></div><div class="orb2"></div><div class="title-court"></div><div style="position:relative;z-index:2"><div class="big-ball"></div><div class="eyebrow">Arcade Hoops</div><h1 class="title">Shoot Your Shot</h1><p class="desc">Shoot. Score. Upgrade. Build a hot streak and chase the Championship Trophy.</p><div class="btn-stack"><button class="main-btn" id="hitCourt">Hit the Court</button><button class="main-btn secondary" id="toLocker">Go to Locker Room</button></div></div></div></div></main>`;$('#hitCourt').onclick=()=>{lastResult=null;pointsPop=null;attemptsUsed=0;setScreen('court')};$('#toLocker').onclick=()=>setScreen('lockerRoom')}

function upgradeCard(item){if(item.type==='section')return section(item.title,item.theme);let maxed=item.isUnlock?false:item.isTrophy?hasWon:upgrades[item.key]>=item.max;let disabled=item.key==='playoffTicket'?currentPoints<PLAYOFF_TICKET_COST:currentPoints<item.cost;let cls=`upgrade ${item.isTrophy||item.isMilestone?'full':''} theme-${item.theme||'lab'} ${disabled?'disabled':''} ${maxed?'maxed':''}`;let info=item.note?`<button class="info" data-info="${item.key}">i</button>`:'';let body='';if(!item.isTrophy&&!item.isMilestone){body=`<div class="up-data"><div class="data-box"><small>Current</small><b>${item.currentValue}</b></div><div class="data-box"><small>Adds</small><b class="add">${maxed?'Maxed':item.addValue}</b></div></div>`}if(item.isMilestone&&!maxed){body+=`<div class="note"><b>Earned at 10,000 points. Claiming does not deduct your points.</b></div>`}let btn=maxed?'Maxed':item.isMilestone?'Claim Earned Ticket':`${item.isUnlock?'Unlock':'Buy'} ${fmt(item.displayCost??item.cost)}`;return `<div class="${cls}"><div class="up-head"><div class="up-title">${item.title}</div>${info}</div>${body}<button class="up-buy" data-buy="${item.key}" ${disabled||maxed?'disabled':''}>${btn}</button></div>`}
function renderLocker(app){let l=SHOT_CONFIG.layup,f=SHOT_CONFIG.freeThrow,t=SHOT_CONFIG.three,h=SHOT_CONFIG.halfCourt;let layupOdds=l.baseOdds+upgrades.layup*l.upgradeStep,freeThrowOdds=f.baseOdds+upgrades.freeThrow*f.upgradeStep,threeOdds=t.baseOdds+upgrades.three*t.upgradeStep,halfCourtOdds=h.baseOdds+upgrades.halfCourt*h.upgradeStep;let items=[{type:'section',title:'Extra Possessions',theme:'possessions'},{key:'extraShots',theme:'possessions',title:'Extra Shots',currentValue:`${shotsPerTrip()}/trip`,addValue:'+1 shot',cost:EXTRA_SHOT_COSTS[upgrades.extraShots]||0,max:EXTRA_SHOT_COSTS.length,action:()=>buyUpgrade('extraShots',EXTRA_SHOT_COSTS[upgrades.extraShots],EXTRA_SHOT_COSTS.length)},{type:'section',title:'Shot Lab',theme:'lab'},{key:'layup',theme:'lab',title:'Layup Accuracy',currentValue:`${layupOdds}%`,addValue:'+5% make',cost:l.costs[upgrades.layup]||0,max:l.costs.length,action:()=>buyUpgrade('layup',l.costs[upgrades.layup],l.costs.length)},{key:'layupSpecialist',theme:'lab',title:'Layup Value',currentValue:`${SHOT_CONFIG.layup.points*(1+upgrades.layupSpecialist)} pts`,addValue:`+${SHOT_CONFIG.layup.points} point`,cost:SPECIALIST_COSTS[upgrades.layupSpecialist]||0,max:SPECIALIST_COSTS.length,action:()=>buyUpgrade('layupSpecialist',SPECIALIST_COSTS[upgrades.layupSpecialist],SPECIALIST_COSTS.length)},{key:'freeThrow',theme:'lab',title:'FT Accuracy',currentValue:`${freeThrowOdds}%`,addValue:'+5% make',cost:f.costs[upgrades.freeThrow]||0,max:f.costs.length,action:()=>buyUpgrade('freeThrow',f.costs[upgrades.freeThrow],f.costs.length)},{key:'freeThrowSpecialist',theme:'lab',title:'Free Throw Value',currentValue:`${SHOT_CONFIG.freeThrow.points*(1+upgrades.freeThrowSpecialist)} pts`,addValue:`+${SHOT_CONFIG.freeThrow.points} pts`,cost:SPECIALIST_COSTS[upgrades.freeThrowSpecialist]||0,max:SPECIALIST_COSTS.length,action:()=>buyUpgrade('freeThrowSpecialist',SPECIALIST_COSTS[upgrades.freeThrowSpecialist],SPECIALIST_COSTS.length)},{key:'three',theme:'lab',title:'3PT Accuracy',currentValue:`${threeOdds}%`,addValue:'+5% make',cost:t.costs[upgrades.three]||0,max:t.costs.length,action:()=>buyUpgrade('three',t.costs[upgrades.three],t.costs.length)},{key:'threeSpecialist',theme:'lab',title:'3PT Value',currentValue:`${SHOT_CONFIG.three.points*(1+upgrades.threeSpecialist)} pts`,addValue:`+${SHOT_CONFIG.three.points} pts`,cost:SPECIALIST_COSTS[upgrades.threeSpecialist]||0,max:SPECIALIST_COSTS.length,action:()=>buyUpgrade('threeSpecialist',SPECIALIST_COSTS[upgrades.threeSpecialist],SPECIALIST_COSTS.length)},!upgrades.halfCourtUnlocked?{key:'unlockHalfCourt',theme:'lab',title:'Unlock Half Court',currentValue:'Locked',addValue:'5 pt shot',cost:h.unlockCost,max:1,isUnlock:true,action:unlockHalfCourt}:{key:'halfCourt',theme:'lab',title:'Half Court Acc.',currentValue:`${halfCourtOdds}%`,addValue:'+5% make',cost:h.costs[upgrades.halfCourt]||0,max:h.costs.length,action:()=>buyUpgrade('halfCourt',h.costs[upgrades.halfCourt],h.costs.length)},upgrades.halfCourtUnlocked&&{key:'halfCourtSpecialist',theme:'lab',title:'Half Court Value',currentValue:`${SHOT_CONFIG.halfCourt.points*(1+upgrades.halfCourtSpecialist)} pts`,addValue:`+${SHOT_CONFIG.halfCourt.points} pts`,cost:SPECIALIST_COSTS[upgrades.halfCourtSpecialist]||0,max:SPECIALIST_COSTS.length,action:()=>buyUpgrade('halfCourtSpecialist',SPECIALIST_COSTS[upgrades.halfCourtSpecialist],SPECIALIST_COSTS.length)},{type:'section',title:'Heat Check',theme:'heat'},{key:'hotHand',theme:'heat',title:'Hot Hand',currentValue:`Lvl ${upgrades.hotHand}`,addValue:upgrades.hotHand>=HOT_HAND_COSTS.length?'Maxed':['2x at 2','3x at 3','4x at 4','6x at 5'][upgrades.hotHand],note:'Made-shot streaks multiply points.',cost:HOT_HAND_COSTS[upgrades.hotHand]||0,max:HOT_HAND_COSTS.length,action:()=>buyUpgrade('hotHand',HOT_HAND_COSTS[upgrades.hotHand],HOT_HAND_COSTS.length)},{type:'section',title:'Luck',theme:'luck'},{key:'doubleRim',theme:'luck',title:'Rim In Chance',currentValue:`${doubleRimChance()}%`,addValue:'+10% rim-in',note:'Chance a missed shot bounces in.',cost:DOUBLE_RIM_COSTS[upgrades.doubleRim]||0,max:DOUBLE_RIM_COSTS.length,action:()=>buyUpgrade('doubleRim',DOUBLE_RIM_COSTS[upgrades.doubleRim],DOUBLE_RIM_COSTS.length)},{key:'goldenBall',theme:'luck',title:'Golden Ball Chance',currentValue:`${goldenChance()}%`,addValue:'+3% golden',note:'Chance the ball appears golden. Golden makes pay 5x.',cost:GOLDEN_BALL_COSTS[upgrades.goldenBall]||0,max:GOLDEN_BALL_COSTS.length,action:()=>buyUpgrade('goldenBall',GOLDEN_BALL_COSTS[upgrades.goldenBall],GOLDEN_BALL_COSTS.length)},{type:'section',title:'The Trophy Case',theme:'trophy'},{key:'playoffTicket',theme:'trophy',title:'Playoff Ticket',currentValue:upgrades.playoffTicket>0?'Claimed':currentPoints>=PLAYOFF_TICKET_COST?'Earned':'Reach 10,000 points',addValue:'Milestone',cost:0,displayCost:0,max:1,isMilestone:true,action:buyPlayoffTicket},{key:'trophy',theme:'trophy',title:'Championship Trophy',currentValue:hasWon?'Owned':'Not owned',addValue:'Win game',cost:TROPHY_COST,max:1,isTrophy:true,action:buyTrophy}].filter(Boolean);
app.innerHTML=`<main class="app"><div class="card"><div class="locker-bg"><div class="locker-inner"><div class="top-glow"></div><button class="main-btn" id="hitCourt">Hit the Court</button><div class="points-box"><div class="label">Current Points</div><div class="points">${fmt(currentPoints)}</div></div><div class="stats-grid"><div class="stat"><div class="stat-label">Shots</div><div class="stat-val">${shotsPerTrip()}</div></div><div class="stat"><div class="stat-label">Streak</div><div class="stat-val">${streak}</div></div><div class="stat"><div class="stat-label">Golden</div><div class="stat-val yellow">${goldenChance()}%</div></div><div class="stat"><div class="stat-label">Hot</div><div class="stat-val green">x${hotHandMult().toFixed(1)}</div></div><div class="stat"><div class="stat-label">Rim In</div><div class="stat-val orange">${doubleRimChance()}%</div></div></div><div class="shop-title">Locker Room</div><div class="shop-scroll"><div class="shop-grid">${items.map(upgradeCard).join('')}</div></div></div></div></div></main>`;
$('#hitCourt').onclick=()=>{lastResult=null;pointsPop=null;attemptsUsed=0;setScreen('court')};document.querySelectorAll('[data-buy]').forEach(b=>{b.onclick=()=>{let it=items.find(x=>x.key===b.dataset.buy);it&&it.action&&it.action()}});document.querySelectorAll('[data-info]').forEach(b=>{b.onclick=()=>{let card=b.closest('.upgrade');let old=card.querySelector('.note.info-note'); if(old){old.remove();return} let it=items.find(x=>x.key===b.dataset.info); if(it?.note){let n=document.createElement('div');n.className='note info-note';n.textContent=it.note;card.insertBefore(n,card.querySelector('.up-data')||card.querySelector('.up-buy'))}}})}
function buyUpgrade(k,c,max){if(!c||currentPoints<c||upgrades[k]>=max)return;currentPoints-=c;upgrades[k]++;render()}function unlockHalfCourt(){let c=SHOT_CONFIG.halfCourt.unlockCost;if(currentPoints<c||upgrades.halfCourtUnlocked)return;currentPoints-=c;upgrades.halfCourtUnlocked=true;render()}function buyPlayoffTicket(){if(currentPoints<PLAYOFF_TICKET_COST||upgrades.playoffTicket>=1)return;upgrades.playoffTicket=1;setScreen('playoff')}function buyTrophy(){if(currentPoints<TROPHY_COST||hasWon)return;currentPoints-=TROPHY_COST;hasWon=true;setScreen('win')}
function courtSvg(){return `<svg class="svg-court" viewBox="0 0 100 100" preserveAspectRatio="none"><defs><filter id="courtShadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="0.6" stdDeviation="0.5" flood-opacity="0.25" /></filter></defs><g opacity="0.18">${[8,16,24,32,40,48,56,64,72,80,88].map(y=>`<line x1="4" y1="${y}" x2="96" y2="${y}" stroke="white" stroke-width="0.35" />`).join('')}</g><g fill="none" stroke="rgba(255,255,255,0.78)" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round" filter="url(#courtShadow)"><rect x="3" y="3" width="94" height="94" rx="5"/><path d="M35 3 V38 H65 V3"/><path d="M38 38 C42 46 58 46 62 38"/><path d="M38 38 C42 30 58 30 62 38" stroke-dasharray="2 2" opacity="0.8"/><path d="M14 3 V43"/><path d="M86 3 V43"/><path d="M14 43 C17 72 83 72 86 43"/><line x1="3" y1="89" x2="97" y2="89"/><path d="M39 97 C41 88 59 88 61 97"/></g><g filter="url(#courtShadow)"><rect x="39" y="5" width="22" height="10" rx="1.5" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.85)" stroke-width="1.2"/><circle cx="50" cy="15" r="5.4" fill="none" stroke="rgb(249,115,22)" stroke-width="2.1"/></g></svg>`}
function renderCourt(app){let remaining=Math.max(0,shotsPerTrip()-attemptsUsed);app.innerHTML=`<main class="court-main"><div class="court-wrap"><div class="card"><div class="court">${courtSvg()}<div class="shot-rack"><div class="rack-title">Shots</div>${Array.from({length:shotsPerTrip()},(_,i)=>`<div class="rack-ball ${i<remaining?'':'used'}"></div>`).join('')}</div><div class="shot-history">${shotHistory.map(i=>`<div class="hist-pill"><p class="${i.points>0?'made-green':'miss-red'}">${i.points>0?'+'+fmt(i.points):'0'}</p></div>`).join('')}</div>${!isShooting?availableShots().map(s=>`<button class="shot-btn" data-shot="${s.id}" style="left:${s.x}%;top:${s.y}%"><span>${s.label}</span><small>+${shotValue(s)} • ${s.odds}%</small></button>`).join(''):''}${activeShot?ballEl(activeShot):''}${lastResult?`<div class="result-word ${lastResult.made?'made-green':'miss-red'}">${lastResult.made?(lastResult.bouncedIn?'RIM IN':lastResult.golden?'GOLDEN':'SWISH'):'CLANK'}</div>`:''}${pointsPop?`<div class="points-pop">+${fmt(pointsPop)}</div>`:''}${bigShotMessage?`<div class="big-shot"><div>${bigShotMessage}</div></div>`:''}</div></div><div class="bottom-stats"><div class="bottom-top"><div><div class="mini-label">Live Stats</div><div class="mini-points">${fmt(currentPoints)}</div></div><button class="locker-btn" id="lockerBtn" ${isShooting?'disabled':''}>Locker Room</button></div><div class="bottom-grid"><div class="bottom-card"><p class="k">Attempt</p><p class="v">${Math.min(attemptsUsed+1,shotsPerTrip())} / ${shotsPerTrip()}</p></div><div class="bottom-card"><p class="k">Streak</p><p class="v">${streak}</p></div><div class="bottom-card"><p class="k">Hot</p><p class="v green">x${hotHandMult().toFixed(1)}</p></div><div class="bottom-card"><p class="k">Gold</p><p class="v yellow">${goldenChance()}%</p></div><div class="bottom-card"><p class="k">Rim</p><p class="v orange">${doubleRimChance()}%</p></div></div></div></div></main>`;document.querySelectorAll('[data-shot]').forEach(b=>b.onclick=()=>takeShot(availableShots().find(s=>s.id===b.dataset.shot)));$('#lockerBtn').onclick=()=>{activeShot=null;isShooting=false;lastResult=null;attemptsUsed=0;setScreen('lockerRoom')}}
function ballEl(s){return `<div class="ball ${s.golden?'golden':''}" style="left:${s.x}%;top:${s.y}%;"></div>`}
function animateBall(shot){let el=document.querySelector('.ball');if(!el)return;let frames;if(shot.bouncedIn){frames=[{left:shot.x+'%',top:shot.y+'%',transform:'translate(-50%,-50%) scale(1)',opacity:1},{left:RIM.x+'%',top:(RIM.y-5)+'%',transform:'translate(-50%,-50%) scale(.74)',opacity:1},{left:(RIM.x+8)+'%',top:(RIM.y-1)+'%',transform:'translate(-50%,-50%) scale(.74)',opacity:1},{left:RIM.x+'%',top:(RIM.y+2)+'%',transform:'translate(-50%,-50%) scale(.46)',opacity:1},{left:RIM.x+'%',top:RIM_DROP_Y+'%',transform:'translate(-50%,-50%) scale(.12)',opacity:0}]}else if(shot.made){frames=[{left:shot.x+'%',top:shot.y+'%',transform:'translate(-50%,-50%) scale(1)',opacity:1},{left:RIM.x+'%',top:(RIM.y-8)+'%',transform:'translate(-50%,-50%) scale(.76)',opacity:1},{left:RIM.x+'%',top:(RIM.y-1)+'%',transform:'translate(-50%,-50%) scale(.58)',opacity:1},{left:RIM.x+'%',top:(RIM.y+3)+'%',transform:'translate(-50%,-50%) scale(.36)',opacity:.9},{left:RIM.x+'%',top:RIM_DROP_Y+'%',transform:'translate(-50%,-50%) scale(.1)',opacity:0}]}else{frames=[{left:shot.x+'%',top:shot.y+'%',transform:'translate(-50%,-50%) scale(1)',opacity:1},{left:RIM.x+'%',top:RIM.y+'%',transform:'translate(-50%,-50%) scale(.82)',opacity:1},{left:(RIM.x+7)+'%',top:(RIM.y+3)+'%',transform:'translate(-50%,-50%) scale(.82)',opacity:1}]};el.animate(frames,{duration:shot.bouncedIn?1450:shot.made?1250:1050,easing:'ease-out',fill:'forwards'})}
function takeShot(shot){if(isShooting)return;let golden=goldenChance()>0&&Math.random()<goldenChance()/100;let initialMake=Math.random()<shot.odds/100;let bouncedIn=!initialMake&&doubleRimChance()>0&&Math.random()<doubleRimChance()/100;let made=initialMake||bouncedIn;let start=attemptsUsed;isShooting=true;lastResult=null;activeShot={...shot,made,golden,bouncedIn};render();setTimeout(()=>animateBall(activeShot),20);setTimeout(()=>{let nextStreak=made?streak+1:0;let earned=made?Math.floor(shotValue(shot)*hotHandMultFor(nextStreak)*(golden?5:1)):0;lastResult={made,golden,bouncedIn,shot:shot.label,points:earned};shotHistory=[{id:Date.now()+'-'+shotCount,shot:shot.label,made,golden,bouncedIn,points:earned},...shotHistory].slice(0,10);if(earned>0){currentPoints+=earned;pointsPop=earned;setTimeout(()=>{pointsPop=null;render()},900);if(earned>=1000){bigShotMessage=earned>=5000?'LEGENDARY BUCKET':'BIG BUCKET';setTimeout(()=>{bigShotMessage=null;render()},1500)}}streak=nextStreak;bestStreak=Math.max(bestStreak,nextStreak);shotCount++;attemptsUsed=start+1;render()},900);setTimeout(()=>{let next=start+1;activeShot=null;isShooting=false;if(next>=shotsPerTrip()){attemptsUsed=0;setScreen('lockerRoom')}else{lastResult=null;render()}},2200)}
function renderPlayoff(app){app.innerHTML=`<main class="modal-screen playoff"><div class="modal-card"><div class="modal-emoji">🎟️</div><div class="modal-eyebrow">Milestone Reached</div><div class="modal-title">Playoff Bound</div><p class="modal-copy">You bought the Playoff Ticket. The Championship Trophy is in sight.</p><div class="modal-stats"><div class="modal-stat"><small>Points</small><b>${fmt(currentPoints)}</b></div><div class="modal-stat"><small>Streak</small><b>${streak}</b></div><div class="modal-stat"><small>Shots</small><b>${shotsPerTrip()}</b></div></div><button class="main-btn" style="margin-top:32px;background:#0ea5e9" id="backLocker">Back to Locker Room</button></div></main>`;$('#backLocker').onclick=()=>setScreen('lockerRoom')}
function renderWin(app){app.innerHTML=`<main class="modal-screen win"><div class="modal-card" style="border-color:#fde047"><div class="modal-emoji">🏆</div><div class="modal-eyebrow" style="color:#fde047">Champion</div><div class="modal-title">You Won</div><p class="modal-copy">You bought the Championship Trophy and beat Shoot Your Shot.</p><div class="modal-stats"><div class="modal-stat"><small>Shots</small><b>${fmt(shotCount)}</b></div><div class="modal-stat"><small>Best Streak</small><b>${bestStreak}</b></div><div class="modal-stat"><small>Points Left</small><b>${fmt(currentPoints)}</b></div></div><button class="main-btn" style="margin-top:32px" id="backLocker">Back to Locker Room</button></div></main>`;$('#backLocker').onclick=()=>setScreen('lockerRoom')}
render();
</script>
</body>
